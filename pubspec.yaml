name: mostro
description: "Mostro Mobile v2 — P2P Bitcoin Lightning exchange"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Bridge: Rust core ↔ Flutter UI
  flutter_rust_bridge: 2.11.1
  rust:
    path: rust_builder

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local persistence (Dart UI layer — all platforms)
  sembast: ^3.8.2
  sembast_web: ^2.3.1+1

  # Secure storage (PIN unlock; key crypto stays in Rust)
  flutter_secure_storage: ^9.2.4

  # Preferences (first-run flag, settings)
  shared_preferences: ^2.5.3

  # Onboarding walkthrough
  introduction_screen: ^3.1.14

  # QR code display and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Cross-platform HTTP client (push server registration)
  http: ^1.2.2

  # System share sheet (invoice sharing)
  share_plus: ^12.0.1

  # Launch external URIs (lightning: wallet handoff)
  url_launcher: ^6.3.1

  # File operations (attachment picker)
  file_picker: ^8.3.7

  # Firebase (push notifications)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Runtime permissions (camera, notifications)
  permission_handler: ^11.4.0

  # File-system paths (DB path on native)
  path_provider: ^2.1.5

  # Internationalization
  intl: ^0.20.2

  # UUID generation (collision-resistant notification IDs)
  uuid: ^4.5.1

  # Skeleton loading shimmer effect (DESIGN_SYSTEM.md §9.1)
  shimmer: ^3.0.0

  # Required by flutter_rust_bridge generated code
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Required by flutter_rust_bridge_codegen generate
  freezed: ^2.5.7
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/fiat.json
    - assets/images/