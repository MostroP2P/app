<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!--
    Cross-origin isolation shim. MUST stay the first script on the page.

    The Rust core runs on wasm threads (SharedArrayBuffer), which browsers only
    enable on a cross-origin isolated page — i.e. one served with
    Cross-Origin-Opener-Policy: same-origin and Cross-Origin-Embedder-Policy.
    Static hosts such as GitHub Pages cannot set response headers, so this
    service worker re-serves every request with them injected. Without it the
    deployed page is blank (see issue #212).

    It is a no-op when the headers are already present — e.g. the local
    `flutter run -d chrome --web-header ...` flow — because the script bails out
    as soon as it sees window.crossOriginIsolated.

    Vendored (do not edit): coi-serviceworker v0.1.7, MIT, from
    https://github.com/gzuidhof/coi-serviceworker — see coi-serviceworker.LICENSE.
  -->
  <script src="coi-serviceworker.min.js"></script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mostro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mostro</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
